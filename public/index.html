<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#101010" />
    <meta name="description" content="Wavely — Your music universe" />

    <!-- Favicons -->
    <link rel="icon"             type="image/png" sizes="64x64" href="%PUBLIC_URL%/favicon.png" />
    <link rel="icon"             type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="192x192"               href="%PUBLIC_URL%/logo192.png" />
    <link rel="shortcut icon"    href="%PUBLIC_URL%/favicon.png" />

    <!-- Preconnect — opens TCP+TLS before first fetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.googleapis.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />
    <link rel="preconnect" href="https://firestore.googleapis.com" />
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" />

    <!-- DNS prefetch for YouTube thumbnails CDN -->
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://yt3.ggpht.com" />

    <!-- Fonts -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap&subset=latin" />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap&subset=latin" />

    <title>Wavely</title>

    <!-- YouTube IFrame API — defer so it doesn't block render -->
    <script src="https://www.youtube.com/iframe_api" defer></script>

    <style>
      *{box-sizing:border-box;margin:0;padding:0}
      html,body,#root{background:#f5efe6;min-height:100vh}
      body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;color:#2f2418;
           -webkit-font-smoothing:antialiased}
      #root-spin{display:flex;align-items:center;justify-content:center;min-height:100vh}
      .rs{width:36px;height:36px;border-radius:50%;
          border:3px solid rgba(194,65,12,.15);border-top-color:#c2410c;
          animation:s .65s linear infinite}
      @keyframes s{to{transform:rotate(360deg)}}
    </style>
  </head>
  <body>
    <noscript>Enable JavaScript to run Wavely.</noscript>
    <div id="root"><div id="root-spin"><div class="rs"></div></div></div>
  </body>
</html>
