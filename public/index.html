<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="Wavely — Your music universe" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Favicon — all sizes -->
    <link rel="icon"             type="image/png" sizes="64x64" href="%PUBLIC_URL%/favicon.png" />
    <link rel="icon"             type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="192x192"               href="%PUBLIC_URL%/logo192.png" />
    <link rel="shortcut icon"    href="%PUBLIC_URL%/favicon.png" />

    <!-- Preconnect for speed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://www.googleapis.com" />
    <link rel="preconnect" href="https://i.ytimg.com" />

    <!-- DNS prefetch YouTube thumbnail CDN -->
    <link rel="dns-prefetch" href="https://i.ytimg.com" />
    <link rel="dns-prefetch" href="https://www.googleapis.com" />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />

    <title>Wavely</title>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api" async></script>

    <!-- Preload fonts -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" />
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" />

    <style>
      /* Critical CSS — prevents flash of unstyled content */
      html,body,#root { margin:0; padding:0; background:#0a0a0f; color:#f0f0ff; min-height:100vh; }
      body { font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif; }
      #root-loading {
        display:flex; align-items:center; justify-content:center;
        min-height:100vh; flex-direction:column; gap:16px;
      }
      .root-spinner {
        width:40px; height:40px; border-radius:50%;
        border:3px solid rgba(124,106,247,0.2);
        border-top-color:#7c6af7;
        animation:spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform:rotate(360deg); } }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run Wavely.</noscript>

    <!-- Instant loading screen shown before React mounts -->
    <div id="root">
      <div id="root-loading">
        <div class="root-spinner"></div>
        <span style="font-size:13px;color:#5a5a7a;letter-spacing:0.05em">WAVELY</span>
      </div>
    </div>
  </body>
</html>
