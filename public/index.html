<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wavely</title>
    <!-- YouTube IFrame Player API -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f5f5f5;
        --color-background-tertiary: #ebebeb;
        --color-background-info: #e8f0fe;
        --color-background-success: #e6f4ea;
        --color-background-warning: #fef7e0;
        --color-background-danger: #fce8e6;
        --color-text-primary: #1a1a1a;
        --color-text-secondary: #555555;
        --color-text-tertiary: #888888;
        --color-text-info: #185fa5;
        --color-text-success: #1e7e34;
        --color-text-warning: #856404;
        --color-text-danger: #c0392b;
        --color-border-primary: #cccccc;
        --color-border-secondary: #dddddd;
        --color-border-tertiary: #eeeeee;
        --border-radius-sm: 4px;
        --border-radius-md: 8px;
        --border-radius-lg: 16px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-background-primary: #1a1a1a;
          --color-background-secondary: #242424;
          --color-background-tertiary: #2e2e2e;
          --color-background-info: #1a2a3a;
          --color-background-success: #1a2e1a;
          --color-background-warning: #2e2510;
          --color-background-danger: #2e1a1a;
          --color-text-primary: #f0f0f0;
          --color-text-secondary: #aaaaaa;
          --color-text-tertiary: #666666;
          --color-text-info: #6aabff;
          --color-text-success: #5cb85c;
          --color-text-warning: #f0ad4e;
          --color-text-danger: #e74c3c;
          --color-border-primary: #444444;
          --color-border-secondary: #333333;
          --color-border-tertiary: #2a2a2a;
        }
        body { background: #121212; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
